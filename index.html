<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KJV Bible PWA</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: system-ui; margin: 0; padding: 0; line-height: 1.6; }
    header { position: sticky; top: 0; background: #fff; padding: 8px; border-bottom: 1px solid #ddd; z-index: 10; }
   .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    select, input, button { padding: 6px; font-size: 16px; }
    #search { flex: 1; min-width: 200px; }
    #search-results { position: absolute; background: #fff; border: 1px solid #ccc; max-height: 400px; overflow-y: auto; width: 100%; display: none; z-index: 20; }
   .search-result { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; }
   .search-result:hover { background: #f5f5f5; }
    #verses { padding: 16px; max-width: 800px; margin: 0 auto; }
   .verse { padding: 4px 0; cursor: pointer; }
   .verse:hover { background: #f9f9f9; }
   .verse sup { color: #666; font-size: 0.8em; margin-right: 6px; user-select: none; }
   .highlighted { background: #fff8c5; }
   .red { color: #c00; }
   .note-icon { margin-left: 6px; cursor: help; }
    #current-ref { font-weight: bold; font-size: 1.2em; }
  </style>
</head>
<body>
  <header>
    <div class="controls">
      <button id="prev-ch">←</button>
      <select id="book-select"></select>
      <select id="chapter-select"></select>
      <button id="next-ch">→</button>
      <span id="current-ref"></span>
    </div>
    <div class="controls">
      <input id="search" type="search" placeholder="Search KJV...">
      <button onclick="exportData()">Export Notes</button>
    </div>
    <div id="search-results"></div>
  </header>
  <main id="verses"></main>
  <script src="app.js"></script>
</body>
</html>
